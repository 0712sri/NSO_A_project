---
- name: Configure nodes
  hosts: nodes
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install python3 and pip
      apt:
        name:
          - python3
          - python3-pip
        state: present

    - name: Install flask
      pip:
        name: flask

    - name: Install SNMPd
      apt:
        name: snmpd
        state: present

    - name: Fix DNS
      copy:
        content: "nameserver 8.8.8.8\n"
        dest: /etc/resolv.conf

    - name: Fix hosts file
      lineinfile:
        path: /etc/hosts
        line: "127.0.1.1 {{ inventory_hostname }}"

    - name: Copy service.py
      copy:
        src: ../service.py
        dest: /home/ubuntu/service.py
        owner: ubuntu
        mode: '0755'

    - name: Add app.run to service.py
      lineinfile:
        path: /home/ubuntu/service.py
        line: "app.run(host='0.0.0.0', port=5000)"

    - name: Start SNMPd
      service:
        name: snmpd
        state: started
        enabled: yes

    - name: Kill old service.py
      shell: "kill $(pgrep -f service.py) 2>/dev/null; exit 0"
      ignore_errors: yes

    - name: Start service.py
      shell: "nohup python3 /home/ubuntu/service.py > /tmp/service.log 2>&1 &"
      args:
        executable: /bin/bash

- name: Configure proxy
  hosts: proxy
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Fix DNS
      copy:
        content: "nameserver 8.8.8.8\n"
        dest: /etc/resolv.conf

    - name: Install HAProxy
      apt:
        name: haproxy
        state: present

    - name: Configure HAProxy
      template:
        src: haproxy.cfg.j2
        dest: /etc/haproxy/haproxy.cfg

    - name: Restart HAProxy
      service:
        name: haproxy
        state: restarted
        enabled: yes
