---
- name: Configure nodes
  hosts: nodes
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install python3 and pip
      apt:
        name:
          - python3
          - python3-pip
        state: present

    - name: Install flask
      pip:
        name: flask

    - name: Install SNMPd
      apt:
        name: snmpd
        state: present

    - name: Fix DNS
      copy:
        content: "nameserver 8.8.8.8\n"
        dest: /etc/resolv.conf

    - name: Fix hosts file
      shell: "hostname | xargs -I{} bash -c 'grep -q {} /etc/hosts || echo 127.0.1.1 {} >> /etc/hosts'"

    - name: Configure SNMPd
      shell: |
        setcap 'cap_net_bind_service=+ep' /usr/sbin/snmpd
        sed -i '/agentAddress/d' /etc/snmp/snmpd.conf
        echo 'agentAddress udp:161,udp6:[::1]:161' >> /etc/snmp/snmpd.conf

    - name: Start SNMPd
      service:
        name: snmpd
        state: restarted
        enabled: yes

    - name: Copy service.py
      copy:
        src: ../service.py
        dest: /home/ubuntu/service.py
        owner: ubuntu
        mode: '0755'

    - name: Add app.run to service.py
      lineinfile:
        path: /home/ubuntu/service.py
        line: "app.run(host='0.0.0.0', port=5000)"

    - name: Create systemd service for service.py
      copy:
        dest: /etc/systemd/system/flask.service
        content: |
          [Unit]
          Description=Flask Service
          After=network.target

          [Service]
          User=ubuntu
          WorkingDirectory=/home/ubuntu
          ExecStart=/usr/bin/python3 /home/ubuntu/service.py
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start flask service
      systemd:
        name: flask
        enabled: yes
        state: restarted
        daemon_reload: yes

- name: Configure proxy
  hosts: proxy
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Fix DNS
      copy:
        content: "nameserver 8.8.8.8\n"
        dest: /etc/resolv.conf

    - name: Install HAProxy
      apt:
        name: haproxy
        state: present

    - name: Configure HAProxy
      template:
        src: haproxy.cfg.j2
        dest: /etc/haproxy/haproxy.cfg

    - name: Restart HAProxy
      service:
        name: haproxy
        state: restarted
        enabled: yes

- name: Configure bastion
  hosts: bastion
  become: yes
  tasks:
    - name: Fix DNS
      copy:
        content: "nameserver 8.8.8.8\n"
        dest: /etc/resolv.conf

    - name: Copy SSH key to bastion
      copy:
        src: /home/srinika/.ssh/openstack_key
        dest: /home/ubuntu/.ssh/openstack_key
        owner: ubuntu
        mode: '0600'
