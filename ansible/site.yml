---
- name: Configure worker nodes
  hosts: nodes
  become: yes
  gather_facts: no
  tasks:
    - name: Wait for cloud-init to complete
      raw: cloud-init status --wait
      changed_when: false

    - name: Wait for apt locks to release
      shell: while fuser /var/lib/dpkg/lock-frontend; do sleep 5; done;
      changed_when: false

    - name: Gather facts
      setup:

    - name: Update apt
      apt:
        update_cache: yes

    - name: Install node packages
      apt:
        name:
          - python3-pip
          - snmpd
        state: present

    - name: Copy service.py
      copy:
        src: ../service.py
        dest: /home/ubuntu/service.py
        mode: '0755'

    - name: Install flask
      pip:
        name: flask
        executable: pip3

    - name: Copy systemd service
      copy:
        src: ../my_flask_app.service
        dest: /etc/systemd/system/my_flask_app.service

    - name: Start flask service
      systemd:
        name: my_flask_app
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Copy snmpd config
      copy:
        src: ../snmpd.conf
        dest: /etc/snmp/snmpd.conf
      notify: restart snmpd

  handlers:
    - name: restart snmpd
      service:
        name: snmpd
        state: restarted

- name: Configure proxy
  hosts: proxy
  become: yes
  gather_facts: no
  tasks:
    - name: Wait for cloud-init to complete
      raw: cloud-init status --wait
      changed_when: false

    - name: Wait for apt locks to release
      shell: while fuser /var/lib/dpkg/lock-frontend; do sleep 5; done;
      changed_when: false

    - name: Gather facts
      setup:

    - name: Install HAProxy
      apt:
        name: haproxy
        state: present
        update_cache: yes

    - name: Configure HAProxy
      template:
        src: haproxy.cfg.j2
        dest: /etc/haproxy/haproxy.cfg
      notify: restart haproxy

    - name: Enable HAProxy
      systemd:
        name: haproxy
        state: started
        enabled: yes

  handlers:
    - name: restart haproxy
      service:
        name: haproxy
        state: restarted

- name: Configure bastion
  hosts: bastion
  become: yes
  gather_facts: no
  tasks:
    - name: Wait for cloud-init
      raw: cloud-init status --wait
      changed_when: false

    - name: Copy SSH key to bastion
      copy:
        src: "{{ ansible_ssh_private_key_file }}"
        dest: /home/ubuntu/.ssh/openstack_key
        owner: ubuntu
        mode: '0600'
