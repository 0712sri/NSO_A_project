---
- name: Configure nodes
  hosts: nodes
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install python3 and pip
      apt:
        name:
          - python3
          - python3-pip
        state: present

    - name: Install flask
      pip:
        name: flask

    - name: Install SNMPd
      apt:
        name: snmpd
        state: present

    - name: Copy service.py
      copy:
        src: ../service.py
        dest: /home/ubuntu/service.py
        owner: ubuntu
        mode: '0755'

    - name: Start SNMPd
      service:
        name: snmpd
        state: started
        enabled: yes

    - name: Start service.py
      shell: nohup python3 /home/ubuntu/service.py > /home/ubuntu/service.log 2>&1 &
      args:
        creates: /home/ubuntu/service.log

- name: Configure proxy
  hosts: proxy
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install HAProxy
      apt:
        name: haproxy
        state: present

    - name: Configure HAProxy
      template:
        src: haproxy.cfg.j2
        dest: /etc/haproxy/haproxy.cfg

    - name: Restart HAProxy
      service:
        name: haproxy
        state: restarted
        enabled: yes
